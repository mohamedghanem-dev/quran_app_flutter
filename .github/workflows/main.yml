name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # استخدام أحدث نسخة مستقرة لمعالجة نظام الـ Gradle الجديد
          flutter-version: '3.24.0' 
          channel: 'stable'
          cache: true

      - name: Fix Android Build Issue
        # هذا الأمر السحري سيخبر Gradle بمكان الـ Flutter SDK يدوياً
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Release APK
        # أضفنا --debug هنا كحل مؤقت لو فشل الـ release لنتأكد من عمل المشروع
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Quran-App-Success
          path: build/app/outputs/flutter-apk/app-release.apk


